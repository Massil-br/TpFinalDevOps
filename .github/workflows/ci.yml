name : CI/CD tpfinal

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]
  tags: 
    - 'v*'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -use: actions/checkout@v4

      -name: Installer Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
      
      -name: Installer les dépendances
      run: npm install

      -name: Lancer les tests
      run: npm test

  lint: 
    name: lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      -uses: actions/checkout@v4

      -name: Installer Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18

      -name: Installer les dé&pendances
      run: npm install

      -name: Vérifier le style du code
      run: npm run lint

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      -uses: actions/checkout@v4

      -name: Définir le tag image 
      id: vars
      run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      -name: Builder l'image Docker
      run: docker build /
        -t ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }} .

      -name: scan de sécurité Trivy
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          ghcr.oi/aquasec/trivy:latest image \
          --exit-code 1 \
          --severity CRITICAL \
          ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }}

      -name: Push sur Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag}} 


  deploy-staging:
    name: deploy staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      -name: Déployer en staging
        run: | 
          echo "Déploiement en staging..."
          echo "Image : ${{ secrets.DOCKER_USERNAME }}/tpfinal:staging"
          echo "Déploiement réussi en staging !"
