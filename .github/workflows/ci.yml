name: CI/CD tpfinal

on:
  push:
    branches: [main, staging]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
        working-directory: ./backend

      - run: npm test
        working-directory: ./backend
        env:
          REDIS_URL: redis://localhost:6379

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: ./backend

      - run: npm run lint
        working-directory: ./backend

  audit:
    name: Audit sécurité npm
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: ./backend

      - name: Audit npm
        run: |
          npm audit --audit-level=high || exit 1
        working-directory: ./backend

      - name: Sauvegarde rapport
        if: failure()
        run: npm audit --json > audit-report.json
        working-directory: ./backend

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: audit-report
          path: backend/audit-report.json

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint, audit]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }} ./backend

      - name: Scan Trivy + rapport
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/app \
            ghcr.io/aquasecurity/trivy:latest image \
            --format json \
            --output /app/trivy-report.json \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }}

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: azure/setup-kubectl@v4

      - name: Config kube
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/taskflow-backend \
            backend=${{ secrets.DOCKER_USERNAME }}/tpfinal:latest \
            -n taskflow-staging

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: azure/setup-kubectl@v4

      - name: Config kube
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Attendre rollout
        run: |
          kubectl rollout status deployment/taskflow-backend \
            -n taskflow-staging --timeout=180s

      - name: Test health
        run: |
          kubectl run smoke-test-$RANDOM \
            --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -n taskflow-staging \
            -- curl -f -s http://taskflow-backend:3001/health | grep '"status":"ok"'

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: azure/setup-kubectl@v4

      - name: Config kube
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/taskflow-backend \
            backend=${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ github.ref_name }} \
            -n taskflow-production
          kubectl rollout status deployment/taskflow-backend \
            -n taskflow-production --timeout=180s
