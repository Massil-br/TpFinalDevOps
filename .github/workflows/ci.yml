name: CI/CD tpfinal

on:
  push:
    branches: [main, staging]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests
        working-directory: ./backend
        env:
          REDIS_HOST: localhost
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le style du code
        run: npm run lint

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Définir le tag image
        id: vars
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Builder l'image Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }} .

      - name: Scan sécurité Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:latest image \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }}

      - name: Push sur Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/tpfinal:${{ steps.vars.outputs.tag }}

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Déployer en staging
        run: |
          echo "Déploiement en staging..."
          echo "Image : ${{ secrets.DOCKER_USERNAME }}/tpfinal:staging"
          echo "Déploiement réussi en staging !"