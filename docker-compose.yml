services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file: .env.example
    ports:
      - "3001:3001"
    depends_on:
      - redis
    networks:
      - backend_net
      - frontend_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend_net
    restart: unless-stopped

volumes:
  redis_data:

networks:
  backend_net:
  frontend_net: